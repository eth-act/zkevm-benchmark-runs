name: Generate Repricing Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      fixtures_url:
        description: 'URL to the fixtures archive (.tar.gz or .tar.zst)'
        required: false
        default: 'https://github.com/jsign/artifacts/releases/download/fixtures_fd1dd63_5_10_15_20_25_30_35_6/fixtures_fd1dd63_5_10_15_20_25_30_35_60.tar.zst'
      fixture_set:
        description: 'Fixture set directory name under proving hardware'
        required: false
        default: 'eest-fd1dd63'
      evm_gas_repricings_branch:
        description: 'Branch of jsign/evm-gas-repricings repo to use'
        required: false
        default: 'jsign-repricing-new-format'

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: [self-hosted-ghr, size-chungus-x64]
    timeout-minutes: 30
    steps:
      - name: Checkout benchmark runs
        uses: actions/checkout@v4

      - name: Clone evm-gas-repricings
        run: |
          git clone https://github.com/jsign/evm-gas-repricings.git \
            --depth 1 \
            --branch ${{ github.event.inputs.evm_gas_repricings_branch || 'jsign-repricing-new-format' }} \
            /tmp/evm-gas-repricings

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev zstd

      - name: Create venv and install dependencies
        working-directory: /tmp/evm-gas-repricings
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Download and extract fixtures
        run: |
          FIXTURES_URL="${{ github.event.inputs.fixtures_url || 'https://github.com/jsign/artifacts/releases/download/fixtures_fd1dd63_5_10_15_20_25_30_35_6/fixtures_fd1dd63_5_10_15_20_25_30_35_60.tar.zst' }}"
          ARCHIVE_PATH="/tmp/fixtures.archive"
          ARCHIVE_URL_PATH="${FIXTURES_URL%%\?*}"

          echo "Downloading fixtures from: $FIXTURES_URL"
          curl -L --fail -o "$ARCHIVE_PATH" "$FIXTURES_URL"

          echo "Extracting fixtures..."
          mkdir -p /tmp/fixtures-extract
          case "$ARCHIVE_URL_PATH" in
            *.tar.zst|*.tzst)
              tar --zstd -xf "$ARCHIVE_PATH" -C /tmp/fixtures-extract
              ;;
            *.tar.gz|*.tgz)
              tar -xzf "$ARCHIVE_PATH" -C /tmp/fixtures-extract
              ;;
            *.tar)
              tar -xf "$ARCHIVE_PATH" -C /tmp/fixtures-extract
              ;;
            *)
              echo "ERROR: Unsupported fixtures archive format: $FIXTURES_URL"
              exit 1
              ;;
          esac

          # Find the blockchain_tests directory regardless of archive nesting
          BLOCKCHAIN_TESTS=$(find /tmp/fixtures-extract -type d -name "blockchain_tests" | head -1)
          if [ -z "$BLOCKCHAIN_TESTS" ]; then
            echo "ERROR: Could not find blockchain_tests directory in archive"
            echo "Archive contents:"
            ls -R /tmp/fixtures-extract | head -50
            exit 1
          fi

          echo "Found blockchain_tests at: $BLOCKCHAIN_TESTS"
          mkdir -p /tmp/evm-gas-repricings/zkevm/fixtures
          cp -r "$BLOCKCHAIN_TESTS" /tmp/evm-gas-repricings/zkevm/fixtures/

          echo "Fixtures structure:"
          find /tmp/evm-gas-repricings/zkevm/fixtures -maxdepth 4 -type d

      - name: Copy benchmark run data
        run: |
          RUNS_DIR="/tmp/evm-gas-repricings/zkevm/runs"
          mkdir -p "$RUNS_DIR"

          FIXTURE_SET="${{ github.event.inputs.fixture_set || 'eest-fd1dd63' }}"
          SOURCE_DIR="data/proving/8x5090/${FIXTURE_SET}"
          echo "Using fixture set: $FIXTURE_SET"

          if [ ! -d "$SOURCE_DIR" ]; then
            echo "ERROR: Fixture set directory not found: $SOURCE_DIR"
            exit 1
          fi

          copied_files=0
          while IFS= read -r json_file; do
            rel_path="${json_file#$SOURCE_DIR/}"

            case "$rel_path" in
              */*/*.json)
                prover_dir=$(basename "$(dirname "$json_file")")
                client_dir=$(basename "$(dirname "$(dirname "$json_file")")")
                ;;
              *)
                continue
                ;;
            esac

            dest_dir="$RUNS_DIR/$client_dir/$prover_dir"
            mkdir -p "$dest_dir"
            cp "$json_file" "$dest_dir/"
            copied_files=$((copied_files + 1))
          done < <(find "$SOURCE_DIR" -type f -name '*.json' ! -name 'hardware.json' | sort)

          if [ "$copied_files" -eq 0 ]; then
            echo "ERROR: No benchmark JSON files found under $SOURCE_DIR"
            exit 1
          fi

          echo "Copied $copied_files benchmark JSON files"

          echo "Runs structure:"
          find "$RUNS_DIR" -mindepth 2 -maxdepth 2 -type d | sort | while read -r dir; do
            client=$(basename "$(dirname "$dir")")
            prover=$(basename "$dir")
            file_count=$(find "$dir" -maxdepth 1 -name '*.json' | wc -l)
            echo "  $client/$prover: $file_count JSON result files"
          done

      - name: Run repricing analysis
        working-directory: /tmp/evm-gas-repricings
        run: |
          echo "Running repricing analysis"
          .venv/bin/python src/estimate_zkevm_repricings.py

      - name: Verify output files
        working-directory: /tmp/evm-gas-repricings
        run: |
          if [ ! -d reports/zkevm ]; then
            echo "ERROR: reports/zkevm directory not created"
            exit 1
          fi

          REPORT_DIR=$(ls -dt reports/zkevm/*/ 2>/dev/null | head -1)
          if [ -z "$REPORT_DIR" ]; then
            echo "ERROR: No report directory found"
            exit 1
          fi

          echo "Report directory: $REPORT_DIR"
          echo "Report contents:"
          find "$REPORT_DIR" -type f | sort

          FILE_COUNT=$(find "$REPORT_DIR" -type f | wc -l)
          echo "Total output files: $FILE_COUNT"

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "ERROR: No output files generated"
            exit 1
          fi

      - name: Copy proposal data to repo
        run: |
          REPORT_DIR=$(ls -dt /tmp/evm-gas-repricings/reports/zkevm/*/ 2>/dev/null | head -1)
          DEST="data/repricing-proposal"

          rm -rf "$DEST"
          mkdir -p "$DEST"

          # Markdown reports
          for md in new_gas_proposal.md runtime_estimation_autogenerated_report.md glue_opcodes_autogenerated_report.md; do
            if [ -f "$REPORT_DIR/$md" ]; then
              cp "$REPORT_DIR/$md" "$DEST/$md"
              echo "Copied $md"
            fi
          done

          # CSV data files
          cp "$REPORT_DIR"/*.csv "$DEST/" 2>/dev/null || true

          echo "Proposal data (figures stored on repricing-figs branch):"
          find "$DEST" -type f | sort

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/repricing-proposal/
          if git diff --cached --quiet; then
            echo "No changes in proposal data, skipping commit."
          else
            git commit -m "repricing: regenerate proposal $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Push figures to orphan branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          REPORT_DIR=$(ls -dt /tmp/evm-gas-repricings/reports/zkevm/*/ 2>/dev/null | head -1)
          FIGS_DIR="$REPORT_DIR/figs"

          if [ ! -d "$FIGS_DIR" ] || [ -z "$(ls -A "$FIGS_DIR")" ]; then
            echo "No figures found, skipping orphan branch push"
            exit 0
          fi

          WORK=$(mktemp -d)
          cp -r "$FIGS_DIR"/* "$WORK/"

          cd "$WORK"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan repricing-figs
          git add .
          git commit -m "repricing figures $(date -u +%Y-%m-%d)"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          git push --force origin repricing-figs

          FIG_COUNT=$(find . -name '*.png' | wc -l)
          echo "Pushed $FIG_COUNT figures to repricing-figs branch"
          rm -rf "$WORK"

      - name: Trigger website deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-website.yml

      - name: Upload repricing reports
        uses: actions/upload-artifact@v4
        with:
          name: repricing-reports-${{ github.run_id }}
          path: /tmp/evm-gas-repricings/reports/zkevm/
          retention-days: 90
