name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch per-opcode figures
        run: |
          if git ls-remote --exit-code origin repricing-figs >/dev/null 2>&1; then
            git fetch origin repricing-figs --depth=1
            mkdir -p data/repricing-proposal/figs
            git archive origin/repricing-figs | tar -x -C data/repricing-proposal/figs/
            echo "Fetched $(ls data/repricing-proposal/figs/*.png 2>/dev/null | wc -l) figures"
          else
            echo "repricing-figs branch not found, deploying without per-opcode figures"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build website
        run: python3 scripts/build_site.py --output dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
