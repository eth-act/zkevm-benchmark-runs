<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereum Proving Gas Repricing Analysis</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container header-row">
            <div class="header-text">
                <h1>Ethereum Proving Gas Repricing Analysis</h1>
                <p>Analyzing zkVM proving costs to identify operations for gas repricing</p>
            </div>
            <button id="theme-toggle" class="btn btn-tertiary" aria-label="Toggle color theme">☀️ Light mode</button>
        </div>
    </header>

    <main class="container">
        <div id="loading" class="loading">Loading benchmark data...</div>
        <div id="error" class="error-message" style="display: none;"></div>
        <div id="app" style="display: none;">
            <!-- Controls Section -->
            <div class="controls">
                <div class="control-group">
                    <label for="baseline">Baseline Operation</label>
                    <select id="baseline" aria-label="Baseline Operation"></select>
                </div>
                <div class="control-group">
                    <label>zkVM View</label>
                    <div class="radio-group" id="zkvm-view">
                        <!-- Dynamically populated -->
                    </div>
                </div>
                <div class="control-group">
                    <label for="search">Search</label>
                    <input type="text" id="search" aria-label="Search tests" placeholder="Filter by name or operation...">
                </div>
                <div class="control-group">
                    <label>
                        <input type="checkbox" id="hide-crashed" aria-label="Hide tests where all zkVMs crashed"> Hide tests where all zkVMs crashed
                    </label>
                </div>
            </div>

            <!-- Summary Statistics -->
            <div class="stats-panel" id="stats-panel">
                <!-- Dynamically populated -->
            </div>

            <!-- Baseline Info Display -->
            <div class="baseline-info" id="baseline-info">
                <!-- Dynamically populated -->
            </div>

            <!-- Operation Filters -->
            <details class="collapsible-section" open>
                <summary><h2>Operation Filters (Opcodes / Precompiles)</h2></summary>
                <div class="collapsible-content">
                    <div class="checkbox-group" id="operation-filters">
                        <!-- Dynamically populated -->
                    </div>
                </div>
            </details>

            <!-- Export Buttons -->
            <div class="export-buttons">
                <button class="btn btn-primary" onclick="exportCSV()">Export CSV</button>
                <button class="btn btn-secondary" onclick="exportJSON()">Export JSON</button>
            </div>

            <!-- Data Table -->
            <div class="section">
                <h2>Benchmark Results <span id="table-count" style="font-size: 0.8rem; color: var(--text-secondary);"></span></h2>
                <div class="pagination" id="pagination-top"></div>
                <div class="table-container">
                    <table id="results-table">
                        <thead>
                            <tr id="table-header">
                                <!-- Dynamically populated -->
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Dynamically populated -->
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination-bottom"></div>
            </div>

        </div>
    </main>

    <footer>
        <div class="container">
            <p>Generated: <span id="generated-at">-</span></p>
            <p>Hardware: <span id="hardware-info">-</span></p>
            <p><a href="data/results.json">Raw Data (JSON)</a></p>
        </div>
    </footer>

    <script>
        // Config
        const DEFAULT_PAGE_SIZE = 50;
        const DEBOUNCE_MS = 150;
        const PAGE_SIZE_OPTIONS = [25, 50, 100, 250];
        const THEME_KEY = 'epra-theme';

        // Global state
        let data = null;
        let filteredTests = [];
        let sortedTests = [];
        let sortColumn = 'name';
        let sortDirection = 'asc';
        let selectedOperations = new Set();
        let selectedZkvmView = 'worst';
        let baselineTestId = null;
        let initialized = false;

        // Pagination state
        let currentPage = 1;
        let pageSize = DEFAULT_PAGE_SIZE;

        // Caches for computed values
        let worstCaseCache = new Map();
        let worstCaseZkvmCache = new Map();
        let relativeCostCache = new Map();
        let searchDebounceTimer = null;

        // Utility functions
        function formatTime(ms) {
            if (ms === null || ms === undefined) return '-';
            if (ms < 1000) return `${ms}ms`;
            if (ms < 60000) return `${(ms / 1000).toFixed(1)}s`;
            const mins = Math.floor(ms / 60000);
            const secs = ((ms % 60000) / 1000).toFixed(0);
            return `${mins}m ${secs}s`;
        }

        function formatThroughput(gasUsed, timeMs) {
            if (!gasUsed || !timeMs) return '-';
            const gasPerSecond = (gasUsed * 1000) / timeMs;
            if (gasPerSecond >= 1_000_000) return `${(gasPerSecond / 1_000_000).toFixed(2)}M gas/s`;
            if (gasPerSecond >= 1_000) return `${(gasPerSecond / 1_000).toFixed(2)}K gas/s`;
            return `${gasPerSecond.toFixed(2)} gas/s`;
        }

        function formatRelativeCost(cost) {
            if (cost === null || cost === undefined) return '-';
            return cost.toFixed(2) + 'x';
        }

        function getRelativeClass(cost) {
            if (cost === null || cost === undefined) return '';
            if (cost < 1.5) return 'relative-low';
            if (cost < 3.0) return 'relative-moderate';
            if (cost < 10.0) return 'relative-high';
            return 'relative-extreme';
        }

        function getProvingTime(test, zkvm) {
            const result = test.results[zkvm];
            if (!result || result.status !== 'success') return null;
            return result.proving_time_ms;
        }

        function getWorstCaseTime(test) {
            if (worstCaseCache.has(test.id)) return worstCaseCache.get(test.id);
            let maxTime = null;
            let worstZkvm = null;
            for (const zkvm of data.zkvms) {
                const time = getProvingTime(test, zkvm);
                if (time !== null && (maxTime === null || time > maxTime)) {
                    maxTime = time;
                    worstZkvm = zkvm;
                }
            }
            worstCaseCache.set(test.id, maxTime);
            worstCaseZkvmCache.set(test.id, worstZkvm);
            return maxTime;
        }

        function getWorstCaseZkvm(test) {
            if (!worstCaseZkvmCache.has(test.id)) {
                getWorstCaseTime(test); // This populates the cache
            }
            return worstCaseZkvmCache.get(test.id);
        }

        function getBaselineTime(zkvm) {
            if (!baselineTestId) return null;
            const baselineTest = data.tests.find(t => t.id === baselineTestId);
            if (!baselineTest) return null;
            if (zkvm === 'worst') return getWorstCaseTime(baselineTest);
            return getProvingTime(baselineTest, zkvm);
        }

        function getRelativeCost(test, zkvm) {
            const cacheKey = `${test.id}-${zkvm}-${baselineTestId}`;
            if (relativeCostCache.has(cacheKey)) return relativeCostCache.get(cacheKey);

            const baselineTime = getBaselineTime(zkvm);
            if (!baselineTime) return null;

            let testTime;
            if (zkvm === 'worst') {
                testTime = getWorstCaseTime(test);
            } else {
                testTime = getProvingTime(test, zkvm);
            }

            if (!testTime) return null;
            const cost = testTime / baselineTime;
            relativeCostCache.set(cacheKey, cost);
            return cost;
        }

        function clearRelativeCostCache() {
            relativeCostCache.clear();
        }

        function renderBaselineInfo() {
            const container = document.getElementById('baseline-info');
            if (!baselineTestId) {
                container.innerHTML = '<p style="color: var(--text-secondary);">No baseline selected</p>';
                return;
            }

            const baselineTest = data.tests.find(t => t.id === baselineTestId);
            if (!baselineTest) {
                container.innerHTML = '<p style="color: var(--text-secondary);">Baseline test not found</p>';
                return;
            }

            let html = `
                <h2>Selected Baseline</h2>
                <div class="baseline-details">
                    <div class="baseline-item operation">
                        <div class="label">Operation</div>
                        <div class="value">${baselineTest.operation}</div>
                        <div class="subtext">${baselineTest.name}</div>
                    </div>
                    <div class="baseline-item">
                        <div class="label">Gas Used</div>
                        <div class="value">${baselineTest.block_used_gas ? (baselineTest.block_used_gas / 1000000).toFixed(1) + 'M' : '-'}</div>
                    </div>
            `;

            // Add proving time for each zkVM
            for (const zkvm of data.zkvms) {
                const result = baselineTest.results[zkvm];
                if (result?.status === 'success') {
                    const throughput = formatThroughput(baselineTest.block_used_gas, result.proving_time_ms);
                    html += `
                        <div class="baseline-item">
                            <div class="label">${zkvm}</div>
                            <div class="value success">${formatTime(result.proving_time_ms)}</div>
                            <div class="subtext">${result.proving_time_ms.toLocaleString()}ms${throughput !== '-' ? ` · ${throughput}` : ''}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="baseline-item">
                            <div class="label">${zkvm}</div>
                            <div class="value crashed">CRASHED</div>
                        </div>
                    `;
                }
            }

            // Add worst case time
            const worstTime = getWorstCaseTime(baselineTest);
            const worstThroughput = baselineTest.block_used_gas && worstTime ? formatThroughput(baselineTest.block_used_gas, worstTime) : '-';
            html += `
                <div class="baseline-item">
                    <div class="label">Worst Case</div>
                    <div class="value ${worstTime !== null ? 'success' : 'crashed'}">${worstTime !== null ? formatTime(worstTime) : 'N/A'}</div>
                    ${worstTime !== null ? `<div class="subtext">${worstTime.toLocaleString()}ms · ${worstThroughput !== '-' ? worstThroughput : ''}</div>` : ''}
                </div>
            `;

            html += '</div>';
            container.innerHTML = html;
        }

        function isAllCrashed(test) {
            return data.zkvms.every(zkvm => {
                const result = test.results[zkvm];
                return !result || result.status !== 'success';
            });
        }

        function anySuccess(test) {
            return data.zkvms.some(zkvm => {
                const result = test.results[zkvm];
                return result && result.status === 'success';
            });
        }

        // Debounce helper
        function debounce(func, wait) {
            return function(...args) {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => func.apply(this, args), wait);
            };
        }

        // Initialize application
        async function init() {
            if (initialized) return;
            try {
                const response = await fetch('data/results.json');
                if (!response.ok) throw new Error('Failed to load data');
                data = await response.json();
                initialized = true;

                // Pre-compute worst case times for all tests
                data.tests.forEach(test => getWorstCaseTime(test));

                // Initialize UI
                initializeControls();
                initializeOperationFilters();
                renderBaselineInfo();
                filterTests();
                sortTests();
                renderTable();
                updateStats();

                // Update footer
                document.getElementById('generated-at').textContent = new Date(data.generated_at).toLocaleString();
                const hw = data.hardware_info;
                document.getElementById('hardware-info').textContent =
                    `${data.hardware} - ${hw.cpu_model}, ${hw.total_ram_gib}GB RAM, ${hw.gpus?.[0]?.model || 'No GPU'}`;

                // Show app
                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = `Error loading data: ${error.message}`;
                document.getElementById('error').style.display = 'block';
            }
        }

        function initializeControls() {
            // Baseline selector
            const baselineSelect = document.getElementById('baseline');
            const successfulTests = data.tests.filter(t => anySuccess(t));

            // Find default baseline (first ADD operation or first successful test)
            let defaultBaseline = successfulTests.find(t => t.operation === 'ADD') || successfulTests[0];
            baselineTestId = defaultBaseline?.id;

            successfulTests.forEach(test => {
                const option = document.createElement('option');
                option.value = test.id;
                option.textContent = `${test.operation} - ${test.name}`;
                if (test.id === baselineTestId) option.selected = true;
                baselineSelect.appendChild(option);
            });

            baselineSelect.addEventListener('change', (e) => {
                baselineTestId = e.target.value;
                clearRelativeCostCache();
                renderBaselineInfo();
                sortTests();
                renderTable();
                updateStats();
            });

            // zkVM view radio buttons
            const zkvmViewContainer = document.getElementById('zkvm-view');
            const views = [
                { value: 'worst', label: 'Worst Case' },
                ...data.zkvms.map(zkvm => ({ value: zkvm, label: zkvm })),
                { value: 'all', label: 'All' }
            ];

            views.forEach(view => {
                const label = document.createElement('label');
                label.className = 'radio-item';
                label.innerHTML = `
                    <input type="radio" name="zkvm-view" value="${view.value}" ${view.value === 'worst' ? 'checked' : ''}>
                    ${view.label}
                `;
                zkvmViewContainer.appendChild(label);
            });

            zkvmViewContainer.addEventListener('change', (e) => {
                selectedZkvmView = e.target.value;
                sortTests();
                renderTable();
                updateStats();
            });

            // Search with debounce
            const debouncedSearch = debounce(() => {
                currentPage = 1;
                filterTests();
                sortTests();
                renderTable();
                updateStats();
            }, DEBOUNCE_MS);
            document.getElementById('search').addEventListener('input', debouncedSearch);

            // Hide crashed
            document.getElementById('hide-crashed').addEventListener('change', () => {
                currentPage = 1;
                filterTests();
                sortTests();
                renderTable();
                updateStats();
            });
        }

        function initializeOperationFilters() {
            const container = document.getElementById('operation-filters');
            const grouped = data.operations_by_category || {};
            const allOps = Object.values(grouped).flat();
            selectedOperations = new Set(allOps.length ? allOps : data.operations);
            container.innerHTML = '';

            // Add "Select All" / "Clear All" buttons
            const btnGroup = document.createElement('div');
            btnGroup.style.marginBottom = '10px';
            btnGroup.innerHTML = `
                <button class="btn btn-secondary" aria-label="Select all operations" onclick="selectAllOperations()">Select All</button>
                <button class="btn btn-secondary" aria-label="Clear all operations" onclick="clearAllOperations()">Clear All</button>
            `;
            container.appendChild(btnGroup);

            const order = ['Opcode', 'Precompile', 'Other'];
            let entries = order
                .filter(key => grouped[key])
                .map(key => [key, grouped[key]]);
            if (entries.length === 0) {
                entries = [['All', [...data.operations].sort((a, b) => a.localeCompare(b))]];
            }

            entries.forEach(([title, items]) => {
                const wrap = document.createElement('div');
                wrap.className = 'filter-group';

                const heading = document.createElement('h3');
                heading.textContent = title;
                wrap.appendChild(heading);

                const grid = document.createElement('div');
                grid.className = 'filter-grid';

                items.forEach(operation => {
                    const label = document.createElement('label');
                    label.className = 'checkbox-item';
                    label.innerHTML = `
                        <input type="checkbox" value="${operation}" checked>
                        ${operation}
                    `;
                    const input = label.querySelector('input');
                    input.addEventListener('change', (e) => {
                        if (e.target.checked) {
                            selectedOperations.add(operation);
                        } else {
                            selectedOperations.delete(operation);
                        }
                        currentPage = 1;
                        filterTests();
                        sortTests();
                        renderTable();
                        updateStats();
                    });
                    grid.appendChild(label);
                });

                wrap.appendChild(grid);
                container.appendChild(wrap);
            });
        }

        function selectAllOperations() {
            const allOps = data.operations_by_category ? Object.values(data.operations_by_category).flat() : data.operations;
            selectedOperations = new Set(allOps);
            document.querySelectorAll('#operation-filters input[type="checkbox"]').forEach(cb => {
                cb.checked = true;
                cb.indeterminate = false;
            });
            currentPage = 1;
            filterTests();
            sortTests();
            renderTable();
            updateStats();
        }

        function clearAllOperations() {
            selectedOperations.clear();
            document.querySelectorAll('#operation-filters input[type="checkbox"]').forEach(cb => {
                cb.checked = false;
                cb.indeterminate = false;
            });
            currentPage = 1;
            filterTests();
            sortTests();
            renderTable();
            updateStats();
        }

        function filterTests() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const hideCrashed = document.getElementById('hide-crashed').checked;

            filteredTests = data.tests.filter(test => {
                if (!selectedOperations.has(test.operation)) return false;
                if (hideCrashed && isAllCrashed(test)) return false;
                if (searchTerm) {
                    const searchStr = `${test.name} ${test.operation} ${test.id}`.toLowerCase();
                    if (!searchStr.includes(searchTerm)) return false;
                }
                return true;
            });
        }

        function sortTests() {
            sortedTests = [...filteredTests].sort((a, b) => {
                let valA, valB;

                if (sortColumn === 'name') {
                    valA = a.name;
                    valB = b.name;
                } else if (sortColumn === 'operation') {
                    valA = a.operation;
                    valB = b.operation;
                } else if (sortColumn === 'worst-time') {
                    valA = getWorstCaseTime(a) ?? Infinity;
                    valB = getWorstCaseTime(b) ?? Infinity;
                } else if (sortColumn === 'worst-relative') {
                    valA = getRelativeCost(a, 'worst') ?? Infinity;
                    valB = getRelativeCost(b, 'worst') ?? Infinity;
                } else if (sortColumn.endsWith('-time')) {
                    const zkvm = sortColumn.replace('-time', '');
                    valA = getProvingTime(a, zkvm) ?? Infinity;
                    valB = getProvingTime(b, zkvm) ?? Infinity;
                } else if (sortColumn.endsWith('-relative')) {
                    const zkvm = sortColumn.replace('-relative', '');
                    valA = getRelativeCost(a, zkvm) ?? Infinity;
                    valB = getRelativeCost(b, zkvm) ?? Infinity;
                }

                if (typeof valA === 'string') {
                    const cmp = valA.localeCompare(valB);
                    return sortDirection === 'asc' ? cmp : -cmp;
                }
                return sortDirection === 'asc' ? valA - valB : valB - valA;
            });
        }

        function renderTable() {
            const thead = document.getElementById('table-header');
            const tbody = document.getElementById('table-body');

            // Update count
            document.getElementById('table-count').textContent = `(${sortedTests.length} tests)`;

            // Build header
            let headerHTML = `
                <th data-sort="operation" class="${sortColumn === 'operation' ? (sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">Operation</th>
                <th data-sort="name" class="${sortColumn === 'name' ? (sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">Test Name</th>
            `;

            if (selectedZkvmView === 'all') {
                data.zkvms.forEach(zkvm => {
                    headerHTML += `
                        <th data-sort="${zkvm}-time" class="${sortColumn === zkvm + '-time' ? (sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">${zkvm} Time</th>
                        <th data-sort="${zkvm}-relative" class="${sortColumn === zkvm + '-relative' ? (sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">${zkvm} Rel.</th>
                    `;
                });
            } else if (selectedZkvmView === 'worst') {
                headerHTML += `
                    <th data-sort="worst-time" class="${sortColumn === 'worst-time' ? (sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">Worst Case Time</th>
                    <th data-sort="worst-relative" class="${sortColumn === 'worst-relative' ? (sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">Relative Cost</th>
                `;
            } else {
                headerHTML += `
                    <th data-sort="${selectedZkvmView}-time" class="${sortColumn === selectedZkvmView + '-time' ? (sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">${selectedZkvmView} Time</th>
                    <th data-sort="${selectedZkvmView}-relative" class="${sortColumn === selectedZkvmView + '-relative' ? (sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''}">Relative Cost</th>
                `;
            }

            headerHTML += `<th>Test ID</th>`;
            thead.innerHTML = headerHTML;

            // Add sort handlers
            thead.querySelectorAll('th[data-sort]').forEach(th => {
                th.addEventListener('click', () => {
                    const col = th.dataset.sort;
                    if (sortColumn === col) {
                        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        sortColumn = col;
                        sortDirection = 'asc';
                    }
                    sortTests();
                    renderTable();
                });
            });

            // Pagination
            const totalPages = Math.ceil(sortedTests.length / pageSize);
            if (currentPage > totalPages) currentPage = Math.max(1, totalPages);

            const startIdx = (currentPage - 1) * pageSize;
            const endIdx = Math.min(startIdx + pageSize, sortedTests.length);
            const pageTests = sortedTests.slice(startIdx, endIdx);

            // Build body
            const rows = [];
            for (const test of pageTests) {
                let rowHTML = `<td><span class="category-badge">${test.operation}</span></td><td>${test.name}</td>`;

                if (selectedZkvmView === 'all') {
                    for (const zkvm of data.zkvms) {
                        const result = test.results[zkvm];
                        if (result?.status === 'success') {
                            const time = result.proving_time_ms;
                            const relative = getRelativeCost(test, zkvm);
                            rowHTML += `<td class="status-success">${formatTime(time)}</td><td class="${getRelativeClass(relative)}">${formatRelativeCost(relative)}</td>`;
                        } else {
                            rowHTML += `<td class="status-crashed">CRASHED</td><td class="status-crashed">-</td>`;
                        }
                    }
                } else if (selectedZkvmView === 'worst') {
                    const time = getWorstCaseTime(test);
                    const relative = getRelativeCost(test, 'worst');
                    const worstZkvm = getWorstCaseZkvm(test);
                    if (time !== null) {
                        rowHTML += `<td class="status-success">${formatTime(time)} <span class="worst-zkvm-badge">${worstZkvm}</span></td><td class="${getRelativeClass(relative)}">${formatRelativeCost(relative)}</td>`;
                    } else {
                        rowHTML += `<td class="status-crashed">ALL CRASHED</td><td class="status-crashed">-</td>`;
                    }
                } else {
                    const result = test.results[selectedZkvmView];
                    if (result?.status === 'success') {
                        const time = result.proving_time_ms;
                        const relative = getRelativeCost(test, selectedZkvmView);
                        rowHTML += `<td class="status-success">${formatTime(time)}</td><td class="${getRelativeClass(relative)}">${formatRelativeCost(relative)}</td>`;
                    } else {
                        rowHTML += `<td class="status-crashed">CRASHED</td><td class="status-crashed">-</td>`;
                    }
                }

                rowHTML += `<td class="test-name" title="${test.id}">${test.id}</td>`;
                rows.push(`<tr>${rowHTML}</tr>`);
            }
            tbody.innerHTML = rows.join('');

            // Render pagination
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const paginationHTML = totalPages > 1 ? `
                <button aria-label="First page" onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>First</button>
                <button aria-label="Previous page" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Prev</button>
                <span class="page-info">Page ${currentPage} of ${totalPages}</span>
                <button aria-label="Next page" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>
                <button aria-label="Last page" onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>Last</button>
                <select aria-label="Rows per page" onchange="changePageSize(this.value)">
                    ${PAGE_SIZE_OPTIONS.map(size => `<option value="${size}" ${pageSize === size ? 'selected' : ''}>${size} per page</option>`).join('')}
                </select>
            ` : '';

            document.getElementById('pagination-top').innerHTML = paginationHTML;
            document.getElementById('pagination-bottom').innerHTML = paginationHTML;
        }

        function goToPage(page) {
            currentPage = page;
            renderTable();
            document.getElementById('results-table').scrollIntoView({ behavior: 'smooth' });
        }

        function changePageSize(size) {
            pageSize = parseInt(size);
            currentPage = 1;
            renderTable();
        }

        function updateStats() {
            const statsPanel = document.getElementById('stats-panel');
            const totalTests = filteredTests.length;
            const zkvmStats = {};

            data.zkvms.forEach(zkvm => {
                zkvmStats[zkvm] = { success: 0, crashed: 0 };
            });

            for (const test of filteredTests) {
                for (const zkvm of data.zkvms) {
                    const result = test.results[zkvm];
                    if (result?.status === 'success') {
                        zkvmStats[zkvm].success++;
                    } else {
                        zkvmStats[zkvm].crashed++;
                    }
                }
            }

            // Find top expensive operations (use cached values)
            const activeZkvm = selectedZkvmView === 'all' ? 'worst' : selectedZkvmView;
            const withRelativeCost = [];
            for (const t of filteredTests) {
                const rc = getRelativeCost(t, activeZkvm);
                if (rc !== null) {
                    withRelativeCost.push({ name: t.name, operation: t.operation, relativeCost: rc });
                }
            }
            withRelativeCost.sort((a, b) => b.relativeCost - a.relativeCost);

            const topExpensive = withRelativeCost.slice(0, 5);
            const topCheap = withRelativeCost.slice(-5).reverse();

            let statsHTML = `
                <div class="stat-card">
                    <h3>Total Tests (Filtered)</h3>
                    <div class="value">${totalTests}</div>
                    <div class="detail">out of ${data.tests.length} total</div>
                </div>
            `;

            data.zkvms.forEach(zkvm => {
                const stats = zkvmStats[zkvm];
                const successRate = totalTests > 0 ? ((stats.success / totalTests) * 100).toFixed(1) : 0;
                statsHTML += `
                    <div class="stat-card ${stats.success > stats.crashed ? 'success' : 'error'}">
                        <h3>${zkvm}</h3>
                        <div class="value">${successRate}%</div>
                        <div class="detail">${stats.success} success, ${stats.crashed} crashed</div>
                    </div>
                `;
            });

            statsHTML += `
                <div class="stat-card warning">
                    <h3>Most Expensive (Top 5)</h3>
                    <ul class="top-list">
                        ${topExpensive.map(t => `<li><div class="top-text"><div class="top-title" title="${t.name}">${t.name}</div><div class="top-sub" title="${t.operation}">${t.operation}</div></div><span class="${getRelativeClass(t.relativeCost)}">${formatRelativeCost(t.relativeCost)}</span></li>`).join('')}
                    </ul>
                </div>
                <div class="stat-card success">
                    <h3>Least Expensive (Top 5)</h3>
                    <ul class="top-list">
                        ${topCheap.map(t => `<li><div class="top-text"><div class="top-title" title="${t.name}">${t.name}</div><div class="top-sub" title="${t.operation}">${t.operation}</div></div><span class="${getRelativeClass(t.relativeCost)}">${formatRelativeCost(t.relativeCost)}</span></li>`).join('')}
                    </ul>
                </div>
            `;

            statsPanel.innerHTML = statsHTML;
        }

        // Export functions
        function exportCSV() {
            const headers = ['Operation', 'Test Name', 'Test ID'];
            if (selectedZkvmView === 'all') {
                data.zkvms.forEach(zkvm => headers.push(`${zkvm} Time (ms)`, `${zkvm} Relative Cost`));
            } else {
                headers.push('Proving Time (ms)', 'Relative Cost');
            }

            const rows = [headers];
            for (const test of filteredTests) {
                const row = [test.operation, test.name, test.id];
                if (selectedZkvmView === 'all') {
                    data.zkvms.forEach(zkvm => {
                        const result = test.results[zkvm];
                        if (result?.status === 'success') {
                            row.push(result.proving_time_ms, getRelativeCost(test, zkvm)?.toFixed(2) || '');
                        } else {
                            row.push('CRASHED', '');
                        }
                    });
                } else {
                    const zkvm = selectedZkvmView === 'worst' ? 'worst' : selectedZkvmView;
                    const time = zkvm === 'worst' ? getWorstCaseTime(test) : getProvingTime(test, zkvm);
                    const relative = getRelativeCost(test, zkvm);
                    row.push(time || 'CRASHED', relative?.toFixed(2) || '');
                }
                rows.push(row);
            }

            const csv = rows.map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
            downloadFile(csv, 'ethereum-proving-analysis.csv', 'text/csv');
        }

        function exportJSON() {
            const exportData = {
                generated_at: new Date().toISOString(),
                baseline: baselineTestId,
                zkvm_view: selectedZkvmView,
                tests: filteredTests.map(test => {
                    const item = { id: test.id, name: test.name, operation: test.operation };
                    if (selectedZkvmView === 'all' || selectedZkvmView === 'worst') {
                        item.worst_case_time_ms = getWorstCaseTime(test);
                        item.worst_case_relative_cost = getRelativeCost(test, 'worst');
                    }
                    if (selectedZkvmView === 'all') {
                        item.results = {};
                        data.zkvms.forEach(zkvm => {
                            item.results[zkvm] = { proving_time_ms: getProvingTime(test, zkvm), relative_cost: getRelativeCost(test, zkvm) };
                        });
                    } else if (selectedZkvmView !== 'worst') {
                        item.proving_time_ms = getProvingTime(test, selectedZkvmView);
                        item.relative_cost = getRelativeCost(test, selectedZkvmView);
                    }
                    return item;
                })
            };
            downloadFile(JSON.stringify(exportData, null, 2), 'ethereum-proving-analysis.json', 'application/json');
        }

        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function applyTheme(theme) {
            const root = document.documentElement;
            const toggle = document.getElementById('theme-toggle');
            root.setAttribute('data-theme', theme);
            root.style.colorScheme = theme;
            if (toggle) {
                toggle.textContent = theme === 'dark' ? '☀️ Light mode' : '🌙 Dark mode';
            }
            localStorage.setItem(THEME_KEY, theme);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }

        // Initialize on load with theme setup first
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
            applyTheme(savedTheme);
            const toggleBtn = document.getElementById('theme-toggle');
            if (toggleBtn) toggleBtn.addEventListener('click', toggleTheme);
            init();
        });
    </script>
</body>
</html>
